name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build + test
        run: ./gradlew build --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: build/reports/tests/test
          if-no-files-found: ignore

  # Отдельный джоб: тонкий :android-модуль. На runner нужен Android SDK — поэтому НЕ в `build`
  # (тот гоняет чистый JVM-core без AGP/SDK). Модуль включается в сборку только при наличии
  # local.properties (см. settings.gradle.kts) — создаём его с sdk.dir от setup-android.
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Enable :android module
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Assemble debug APK + parity tests
        run: ./gradlew :android:assembleDebug :android:testDebugUnitTest --no-daemon

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: android-debug-apk
          path: android/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

      - name: Upload android test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: android-test-results
          path: android/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
